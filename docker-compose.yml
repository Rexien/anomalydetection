version: '3.8'

services:
  nextcloud:
    container_name: nextcloud
    image: docker.io/kefaslungu/hng-nextcloud
    restart: unless-stopped
    volumes:
      - nextcloud_data:/var/www/html
      - HNG-nginx-logs:/var/log/nginx:ro

  nginx:
    image: docker.io/library/nginx:latest
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - HNG-nginx-logs:/var/log/nginx
    depends_on:
      - nextcloud

  detector:
    build: ./detector
    restart: unless-stopped
    network_mode: "host"
    privileged: true
    volumes:
      - HNG-nginx-logs:/var/log/nginx:ro
      - detector_logs:/var/log/detector
    depends_on:
      - nginx

volumes:
  nextcloud_data:
  HNG-nginx-logs:
  detector_logs:
