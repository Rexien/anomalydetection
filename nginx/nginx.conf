worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── JSON access log format ──────────────────────────────────────
    # Required fields: source_ip, timestamp, method, path, status, response_size
    log_format json_combined escape=json
        '{'
            '"source_ip":"$remote_addr",'
            '"timestamp":"$time_iso8601",'
            '"method":"$request_method",'
            '"path":"$request_uri",'
            '"status":$status,'
            '"response_size":$body_bytes_sent,'
            '"http_user_agent":"$http_user_agent",'
            '"request_time":"$request_time",'
            '"http_x_forwarded_for":"$http_x_forwarded_for"'
        '}';

    access_log /var/log/nginx/hng-access.log json_combined;

    # ── Trust X-Forwarded-For from all sources ──────────────────────
    set_real_ip_from  0.0.0.0/0;
    real_ip_header    X-Forwarded-For;
    real_ip_recursive on;

    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 512M;

    upstream nextcloud_backend {
        server nextcloud:80;
    }

    # ── Default server: Nextcloud (accessed by IP) ──────────────────
    server {
        listen 80 default_server;
        server_name _;

        location / {
            proxy_pass         http://nextcloud_backend;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 300;
            proxy_send_timeout 300;
        }
    }

    # ── Dashboard server: served at your domain/subdomain ───────────
    # Replace zamistage3.duckdns.org with your actual domain before deploying
    server {
        listen 80;
        server_name zamistage3.duckdns.org;

        location / {
            proxy_pass         http://host.docker.internal:8080;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
        }
    }
}
